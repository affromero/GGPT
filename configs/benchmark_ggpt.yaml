common_config:
  seed: 42
  num_workers: 4
  ddp: True
  save_vis: False
  load_ckpt: ckpts/model.step228000.pth
hydra:
  run: 
    dir: outputs/benchmark_lowres/ggpt_vggt-point-romav2-base

ggptmodel_config:
  _target_: ggpt.model.base.BasePredictor
  grid_resolution: 384 
  type_embed_dim: 16
  sinusoidal_dim: 32
  zero_init: True
  predict_residual: True
  backbone_type: 'ptv3' #or 'spconv_unet'
  ptv3_config:
    enc_dim: 128
    output_dim: 96
    turn_off_bn: False 
    stride: 
      - 2
      - 2
      - 2
      - 2
    enable_flash: True
    embedding_type: 'MLP'
  head_width: 256
  
valdataset_configs:
  _target_: ggpt.dataloader.eval_dataset.EvalDataset
  pca_transform: False
  chunk_sample: 'random'
  data_dict:
    eth3d_4views: outputs/benchmark_lowres/sfm_vggt-point-romav2-base/save/eth3d_4views/*
    # eth3d_8views: outputs/benchmark/sfm_vggt-point-romav2-base/save/eth3d_8views/*
    # eth3d_16views: outputs/benchmark/sfm_vggt-point-romav2-base/save/eth3d_16views/*
    scannetpp_4views: outputs/benchmark_lowres/sfm_vggt-point-romav2-base/save/scannetpp_4views/*
    # scannetpp_8views: outputs/benchmark/sfm_vggt-point-romav2-base/save/scannetpp_8views/*
    # scannetpp_16views: outputs/benchmark/sfm_vggt-point-romav2-base/save/scannetpp_16views/*
    tandt_4views: outputs/benchmark_lowres/sfm_vggt-point-romav2-base/save/tandt_4views/*
    # tandt_8views: outputs/benchmark/sfm_vggt-point-romav2-base/save/tandt_8views/*
    # tandt_16views: outputs/benchmark/sfm_vggt-point-romav2-base/save/tandt_16views/*
    # mvdvrk: outputs/benchmark/sfm_vggt-point-romav2-base/save/mvdvrk/*
    4ddress: outputs/benchmark_lowres/sfm_vggt-point-romav2-base/save/4ddress/*
